{% extends "base.html" %}
{% block content %}
<main class="login-shell">
  <section class="login-card">
    <p class="eyebrow">TAO 监控后台</p>
    <h1 class="login-title">请输入后台账号密码</h1>
    <p class="lede">监控服务会持续在后台运行，这个登录页只是用来保护你的网页管理入口。</p>
    {% if error %}
    <div class="banner error">{{ error }}</div>
    {% endif %}
    <form class="stack" method="post" action="/login">
      <label>
        <span>用户名</span>
        <input name="username" type="text" placeholder="请输入后台用户名" required>
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" placeholder="请输入后台密码" required>
      </label>
      <button class="action" type="submit">登录后台</button>
    </form>
  </section>
</main>
{% endblock %}
