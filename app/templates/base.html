<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "TAO Monitor" }}</title>
  <script>
    (() => {
      const savedTheme = localStorage.getItem("tao-monitor-theme");
      if (savedTheme === "light" || savedTheme === "dark") {
        document.documentElement.setAttribute("data-theme", savedTheme);
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=20260429-7">
</head>
<body>
  {% block content %}{% endblock %}
  <script src="/static/app.js?v=20260429-7"></script>
</body>
</html>
